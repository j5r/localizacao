<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="prefetch" href="localizacao.html">


    <title>Gerador de Localização</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .campo {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #666;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-bottom: 1rem;
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-colar {
            background-color: #9dd89d;
            color: #333;
        }

        .btn-gerar {
            background-color: #28a745;
            font-weight: bold;
            margin-bottom: 0;
        }

        .divider {
            text-align: center;
            margin: 10px 0;
            color: #aaa;
            font-size: 0.8rem;
        }

        .destaque {
            color: #a82424;
        }

        #tutorial {
            display: flex;
            justify-content: flex-end;
            /* Alinha o botão totalmente à direita */
            width: 100%;
            /* Garante que o contêiner ocupe toda a largura disponível */
            margin-top: 20px;
            
        }

        .btn-tutorial {
            display: inline-block;
            border-radius: 6px;
        }

        .btn-tutorial:hover {
            opacity: 0.7;
            cursor:help;  
        }

        #tutorial>a {
            background-color: #007bff;
            color: white;
            padding: 15px 20px;
            font-size: .9rem;
            box-shadow: 0 2px 8px rgba(0, 123, 255, 0.7);
        }

        #pix {
            display: flex;
            justify-content: flex-end;
            width: 100%;
            margin-top: 5px;
        }

        #pix>img {
            display: none;
        }

        #pix>p {
            background-color: #8f45c5aa;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
        }

        #pix:hover {
            opacity: 0.6;
            transition: opacity 0.5s;
            cursor:crosshair;          
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Localização</h1>
        <button class="btn-colar" onclick="colarDoClipboard()">
            📋 Colar link do Maps <br><strong class="destaque">(clique aqui para colar)</strong>
        </button>

        <div class="divider">OU PREENCHA MANUALMENTE</div>

        <div class="campo">
            <label>Latitude</label>
            <input type="text" id="lat" placeholder="Ex: -20.456662"
                oninput="this.value = this.value.replace(',', '.')">
        </div>
        <div class="campo">
            <label>Longitude</label>
            <input type="text" id="long" placeholder="Ex: -54.575978"
                oninput="this.value = this.value.replace(',', '.')">
        </div>

        <button class="btn-gerar" onclick="irParaLocalizacao()">Gerar Links de App</button>

        <br>
        <div id="tutorial">
            <a href="tutorial.html" class="btn-tutorial">Aprenda a usar</a>
        </div>

        <div id="pix">
      <p onclick="copiarPix()">Ajudei você?<br>Se puder, doe qualquer quantia clicando aqui ❤️</p>
    </div>
    </div>



    <script>
        if('serviceWorker' in navigator){
            navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('servico de cacheamento registrado'))
            .catch((error) => console.error('Erro ao registrar o service worker:', error));
        }
        const regexGoogle = /!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/g;
        const regexNumeros = /(-?\d+\.\d+)/g;

        // Executa automaticamente ao abrir a página
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);

            // Verifica se a URL atual possui latitude e alguma variação de longitude
            if (params.has('lat') && (params.has('long') || params.has('lon'))) {
                // Padroniza o parâmetro para 'long' caso venha como 'lon'
                if (params.has('lon')) {
                    params.set('long', params.get('lon'));
                    params.delete('lon');
                }
                params.set('possoVoltar', 'no'); // Adiciona um parâmetro para indicar que já processamos a URL
                // Avança direto para a página de destino passando a query string completa
                window.location.href = `localizacao.html?${params.toString()}`;
            }
        });

        async function colarDoClipboard() {
            try {
                let texto = await navigator.clipboard.readText();
                texto = texto.replace(/\s?,\s+?/g, ' ').replace(/,/g, '.').replace(/\s+/g, ', ').trim();

                const matchesGoogle = [...texto.matchAll(regexGoogle)];
                if (matchesGoogle.length > 0) {
                    const alvo = matchesGoogle[matchesGoogle.length - 1];
                    definirCoords(alvo[1], alvo[2]);
                    return;
                }

                const todosNumeros = [...texto.matchAll(regexNumeros)];
                if (todosNumeros.length >= 2) {
                    definirCoords(todosNumeros[todosNumeros.length - 2][0], todosNumeros[todosNumeros.length - 1][0]);
                } else {
                    alert("Não encontrei coordenadas. Tente copiar os números decimais diretamente.");
                }
            } catch (err) {
                alert("Erro ao ler área de transferência. Verifique permissões.");
            }
        }

        function definirCoords(lat, long) {
            document.getElementById('lat').value = lat;
            document.getElementById('long').value = long;
        }

        function irParaLocalizacao() {
            const lat = document.getElementById('lat').value.trim();
            const long = document.getElementById('long').value.trim();

            if (!lat || !long) {
                return alert("Preencha as coordenadas primeiro!");
            }

            const params = new URLSearchParams({ lat, long });
            params.set('possoVoltar', 'yes');
            window.location.href = `localizacao.html?${params.toString()}`;
        }

        function copiarPix() {
      document.getElementById('pix').style.display = "none";
      if (!document.getElementById('input-pix')) {
        const container = document.getElementsByClassName('container')[0];
        const above_div = document.createElement('p');
        container.appendChild(above_div);
        above_div.innerText = "Copie o Código PIX abaixo";
        const input = document.createElement('input');
        container.appendChild(input);
        input.id = "input-pix";
        input.type = "text";
        input.readOnly = true;

        input.setAttribute('value',
          '00020126580014BR.GOV.BCB.PIX013615372e19-62b5-421d-88cb-f06edbfddbc95204000053039865802BR5924Junior Rodrigues Ribeiro6009SAO PAULO62140510wtfWI7pyR36304B7F1'
        );
        input.setAttribute('readonly', true);
        input.setAttribute('onclick',"this.select()");
        input.style.width = "100%";
      }

      input.select();
    }
    </script>
</body>

</html>
