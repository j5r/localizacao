<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="prefetch" href="localizacao.html">
    <title>Gerador de Localização</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .campo {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #666;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-bottom: 1rem;
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-colar {
            background-color: #9dd89d;
            color: #333;
        }

        .btn-gerar {
            background-color: #28a745;
            font-weight: bold;
            margin-bottom: 0;
        }

        .divider {
            text-align: center;
            margin: 10px 0;
            color: #aaa;
            font-size: 0.8rem;
        }

        .destaque {
            color: #a82424;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Localização</h1>
        <button class="btn-colar" onclick="colarDoClipboard()">
            📋 Colar link do Maps <br><strong class="destaque">(clique aqui para colar)</strong>
        </button>

        <div class="divider">OU PREENCHA MANUALMENTE</div>

        <div class="campo">
            <label>Latitude</label>
            <input type="text" id="lat" placeholder="Ex: -20.456662"
                oninput="this.value = this.value.replace(',', '.')">
        </div>
        <div class="campo">
            <label>Longitude</label>
            <input type="text" id="long" placeholder="Ex: -54.575978"
                oninput="this.value = this.value.replace(',', '.')">
        </div>

        <button class="btn-gerar" onclick="irParaLocalizacao()">Gerar Links de App</button>
    </div>

    <script>
        const regexGoogle = /!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/g;
        const regexNumeros = /(-?\d+\.\d+)/g;

        // Executa automaticamente ao abrir a página
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);

            // Verifica se a URL atual possui latitude e alguma variação de longitude
            if (params.has('lat') && (params.has('long') || params.has('lon'))) {
                // Padroniza o parâmetro para 'long' caso venha como 'lon'
                if (params.has('lon')) {
                    params.set('long', params.get('lon'));
                    params.delete('lon');
                }
                params.set('possoVoltar', 'no'); // Adiciona um parâmetro para indicar que já processamos a URL
                // Avança direto para a página de destino passando a query string completa
                window.location.href = `localizacao.html?${params.toString()}`;
            }
        });

        async function colarDoClipboard() {
            try {
                let texto = await navigator.clipboard.readText();
                texto = texto.replace(/\s?,\s+?/g, ' ').replace(/,/g, '.').replace(/\s+/g, ', ').trim();

                const matchesGoogle = [...texto.matchAll(regexGoogle)];
                if (matchesGoogle.length > 0) {
                    const alvo = matchesGoogle[matchesGoogle.length - 1];
                    definirCoords(alvo[1], alvo[2]);
                    return;
                }

                const todosNumeros = [...texto.matchAll(regexNumeros)];
                if (todosNumeros.length >= 2) {
                    definirCoords(todosNumeros[todosNumeros.length - 2][0], todosNumeros[todosNumeros.length - 1][0]);
                } else {
                    alert("Não encontrei coordenadas. Tente copiar os números decimais diretamente.");
                }
            } catch (err) {
                alert("Erro ao ler área de transferência. Verifique permissões.");
            }
        }

        function definirCoords(lat, long) {
            document.getElementById('lat').value = lat;
            document.getElementById('long').value = long;
        }

        function irParaLocalizacao() {
            const lat = document.getElementById('lat').value.trim();
            const long = document.getElementById('long').value.trim();

            if (!lat || !long) {
                return alert("Preencha as coordenadas primeiro!");
            }

            const params = new URLSearchParams({ lat, long });
            params.set('possoVoltar', 'yes');
            window.location.href = `localizacao.html?${params.toString()}`;
        }
    </script>
</body>

</html>
